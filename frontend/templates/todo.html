<!DOCTYPE html>
<html lang="en">    
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>

  <!-- Google Fonts + Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/todo.css">
</head>

<body>  
<div class="d-flex">  
  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3" id="sidebar">
      <div class="logo mb-4 text-center">
          <img src="/static/images/logo.png" alt="Logo" class="img-fluid" style="max-height:54px;">
      </div>

      <ul class="nav flex-column nav-list">
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/dashboard">
                  <img src="/static/images/dashboard.png" alt="dashboard" class="nav-icon"> 
                  <span>Dashboard</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/todo">
                  <img src="/static/images/todo.png" alt="Todo" class="nav-icon"> 
                  <span>Todo</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/enquiry">
                  <img src="/static/images/enquiry.png" alt="Enquiry" class="nav-icon"> 
                  <span>Enquiry</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/expiry">
                  <img src="/static/images/expiry.png" alt="Expiry" class="nav-icon"> 
                  <span>Expiry</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/updation">
                  <img src="/static/images/updation.png" alt="Updation" class="nav-icon"> 
                  <span>Updation</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/quotation">
                  <img src="/static/images/quotation.png" alt="Quotation" class="nav-icon"> 
                  <span>Quotation</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/clients">
                  <img src="/static/images/clients.png" alt="clients" class="nav-icon"> 
                  <span>Clients</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/projects">
                  <img src="/static/images/projects.png" alt="projects" class="nav-icon"> 
                  <span>Projects</span>
              </a>
          </li>
      </ul>

      <div class="logout mt-auto">
          <a href="#" class="nav-link d-flex align-items-center">
              <img src="/static/images/logout.png" alt="Logout" class="nav-icon"> 
              <span>Logout</span>
          </a>
      </div>
  </div>

  <!-- Content Wrapper -->
  <div class="content-wrapper flex-grow-1">
      <div class="dashboard-head d-flex justify-content-between align-items-center px-3 flex-nowrap mb-4">
          <button class="btn toggle-btn d-lg-none " id="sidebarToggle">☰</button>
          <h1 class="dashboard m-0 flex-grow-1 text-start">Todo</h1>
          <div class="d-flex align-items-center ms-auto">
              <img src="/static/images/logo.png" alt="Profile" class="rounded-circle profile-logo" style="width:40px; height:40px; cursor:pointer;">
          </div>
      </div>

      <div class="main-content p-3">
          <div class="d-flex align-items-center flex-wrap mb-3">
              <p class="mb-2 sub-main">Tasks</p>
              <div class="ms-auto d-flex gap-2 flex-wrap">
                  <div class="d-flex align-items-center gap-2">
                      <button class="btn btn-outline-secondary btn-sm" id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
                      <div class="month-label" id="monthLabel">Month</div>
                      <button class="btn btn-outline-secondary btn-sm" id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
                  </div>
                  <button type="button" class="btn custombtn btn-primary" onclick="window.location.href='/todo/add/'">+ Create Todo</button>
              </div>
          </div>

          <div class="row g-3">
              <div class="col-12 col-lg-5">
                  <div class="calendar-wrap">
                      <div class="calendar-grid" id="calendarGrid"></div>
                  </div>
              </div>
              <div class="col-12 col-lg-7">
                  <div class="table-responsive">
                      <table class="table align-middle">
                          <thead class="table-light">
                              <tr>
                                  <th>SL No</th>
                                  <th>Date</th>
                                  <th>Time</th>
                                  <th>Title</th>
                                  <th>Status</th>
                                  <th>Action</th>
                              </tr>
                          </thead>
                          <tbody class="table-data"></tbody>
                      </table>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>

<script src="/static/todo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
