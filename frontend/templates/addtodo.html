<!DOCTYPE html>
<html lang="en">    
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Todo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/addtodo.css">
</head>

<body>  
<div class="d-flex flex-nowrap">  
  <div class="sidebar d-flex flex-column p-3" id="sidebar">
      <div class="logo mb-4 text-center">
          <img src="/static/images/logo.png" alt="Logo" class="img-fluid" style="max-height:54px;">
      </div>

      <ul class="nav flex-column nav-list">
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/dashboard">
                  <img src="/static/images/dashboard.png" alt="dashboard" class="nav-icon"> 
                  <span>Dashboard</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/todo">
                  <img src="/static/images/todo.png" alt="Todo" class="nav-icon"> 
                  <span>Todo</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/enquiry">
                  <img src="/static/images/enquiry.png" alt="Enquiry" class="nav-icon"> 
                  <span>Enquiry</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/expiry">
                  <img src="/static/images/expiry.png" alt="Expiry" class="nav-icon"> 
                  <span>Expiry</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/updation">
                  <img src="/static/images/updation.png" alt="Updation" class="nav-icon"> 
                  <span>Updation</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/quotation">
                  <img src="/static/images/quotation.png" alt="Quotation" class="nav-icon"> 
                  <span>Quotation</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/clients">
                  <img src="/static/images/clients.png" alt="clients" class="nav-icon"> 
                  <span>Clients</span>
              </a>
          </li>
          <li class="nav-item mb-2">
              <a class="nav-link d-flex align-items-center" href="/projects">
                  <img src="/static/images/projects.png" alt="projects" class="nav-icon"> 
                  <span>Projects</span>
              </a>
          </li>
      </ul>

      <div class="logout mt-auto">
          <a href="#" class="nav-link d-flex align-items-center">
              <img src="/static/images/logout.png" alt="Logout" class="nav-icon"> 
              <span>Logout</span>
          </a>
      </div>
  </div>

  <div class="content-wrapper flex-grow-1">
      <div class="dashboard-head d-flex justify-content-between align-items-center px-3 flex-nowrap mb-4">
          <button class="btn toggle-btn d-lg-none" id="sidebarToggle">☰</button>
          <h1 class="dashboard m-0 flex-grow-1">Create Todo</h1>
          <div class="d-flex align-items-center ms-auto">
              <img src="/static/images/logo.png" alt="Profile" class="rounded-circle" style="width:40px; height:40px;">
          </div>
      </div>

      <div class="main-content p-3 bg-white shadow-sm rounded-3">
        <form id="todoForm">
          <div class="row g-3">
            <div class="col-lg-6 col-md-6">
              <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
              <input type="text" class="form-control subtext" id="title" placeholder="Task title" required>
            </div>

            <div class="col-lg-3 col-md-6">
              <label for="taskDate" class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control subtext" id="taskDate" required>
            </div>

            <div class="col-lg-3 col-md-6">
              <label for="status" class="form-label">Status</label>
              <select class="form-select subtext" id="status">
                <option value="NotYet">Not yet</option>
                <option value="Done">Done</option>
                <option value="Postponed">Postpone</option>
              </select>
            </div>

            <div class="col-lg-6 col-md-12">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control subtext" id="description" rows="3" placeholder="Notes / description"></textarea>
            </div>

            <div class="col-lg-3 col-md-6">
              <label for="startTime" class="form-label">Start Time</label>
              <input type="time" class="form-control subtext" id="startTime">
            </div>

            <div class="col-lg-3 col-md-6">
              <label for="endTime" class="form-label">End Time</label>
              <input type="time" class="form-control subtext" id="endTime">
            </div>

            <div class="col-lg-3 col-md-6 d-none" id="postponeWrap">
              <label for="postponeTo" class="form-label">Postpone To <span class="text-danger">*</span></label>
              <input type="date" class="form-control subtext" id="postponeTo">
            </div>

            <div class="col-12 d-flex justify-content-start mt-3">
              <button type="submit" class="btn custom-btn1 me-2">Save</button>
              <button type="button" id="cancelBtn" class="btn custom-btn2">Cancel</button>
            </div>
          </div>
        </form>
      </div>
  </div>
</div>

<script src="/static/addtodo.js"></script>
</body>
</html>
